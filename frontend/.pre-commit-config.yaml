# Frontend commit gates — a nested prek workspace project, discovered from the root
# .pre-commit-config.yaml. Hooks run with frontend/ as the working directory; `files`
# regexes are project-relative. Heavier checks (build, vitest, the schema.d.ts drift gate,
# dependency-cruiser cycles, knip) run in the CI frontend job, not on every commit.
repos:
  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend lint (prettier + eslint + boundaries)
        language: system
        entry: npm run lint
        pass_filenames: false
        files: '\.(ts|js|svelte|css|json)$'
      - id: frontend-check
        name: frontend svelte-check (types, a11y, markup)
        language: system
        entry: npm run check
        pass_filenames: false
        files: '\.(ts|svelte)$'
